name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      BL_API_KEY: ci-placeholder-key
      NFL_LOG_TO_FILE: "0"
      NFL_QUERY_TEST_QUIET_LOGS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:quiet

      - name: Build
        run: npm run build
