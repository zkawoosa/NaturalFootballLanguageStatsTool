name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      NFL_SOURCE: nflverse
      NFLVERSE_DEFAULT_SEASON: "2025"
      NFLVERSE_SNAPSHOT_SEASON: "2025"
      NFL_SQLITE_PATH: data/ci-nfl-query.sqlite
      NFL_LOG_TO_FILE: "0"
      NFL_QUERY_TEST_QUIET_LOGS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build nflverse snapshot
        run: npm run build:snapshot

      - name: Verify nflverse snapshot
        run: npm run verify:snapshot

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:quiet

      - name: Build
        run: npm run build
