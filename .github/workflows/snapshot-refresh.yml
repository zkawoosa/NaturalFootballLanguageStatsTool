name: snapshot-refresh

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NFLVERSE_DEFAULT_SEASON: "2025"
  NFLVERSE_SNAPSHOT_SEASON: "2025"

concurrency:
  group: snapshot-refresh
  cancel-in-progress: true

jobs:
  build-and-push-refresh-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute refresh image tags
        id: tags
        run: |
          refresh_tag="refresh-$(date -u +%Y%m%d)"
          {
            echo "tags<<EOF"
            echo "${REGISTRY}/${IMAGE_NAME}:latest"
            echo "${REGISTRY}/${IMAGE_NAME}:${refresh_tag}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push refreshed image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            NFLVERSE_DEFAULT_SEASON=${{ env.NFLVERSE_DEFAULT_SEASON }}
            NFLVERSE_SNAPSHOT_SEASON=${{ env.NFLVERSE_SNAPSHOT_SEASON }}

      - name: Trigger Render redeploy
        if: success() && secrets.RENDER_DEPLOY_HOOK_URL != ''
        run: curl --fail --silent --show-error --request POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
